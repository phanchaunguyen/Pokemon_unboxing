spring.application.name=pokemon-unboxing-backend

# ----------------------------------------
# SERVER CONFIGURATION
# ----------------------------------------
# Defaults to 8080 locally. Railway will automatically inject its own PORT later.
server.port=${PORT:8080}

# ----------------------------------------
# DATABASE CONFIGURATION (PostgreSQL)
# ----------------------------------------
# Defaults to localhost:5432/pokemon_db for local development
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pokemon_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# REDIS CONFIGURATION
# ----------------------------------------
# Defaults to local Redis for development
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}