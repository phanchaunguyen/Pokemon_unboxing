version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: pokemon_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokemon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Redis Cache / Distributed Lock
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pokemon_redis
    restart: always
    ports:
      - "6379:6379"

  # ----------------------------------------
  # pgAdmin Database Manager
  # ----------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pokemon_pgadmin
    restart: always
    environment:
      # Login credentials for the pgAdmin web UI
      PGADMIN_DEFAULT_EMAIL: admin@pokemon.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

# Define volumes so your database data isn't wiped out when you stop the container
volumes:
  postgres_data: